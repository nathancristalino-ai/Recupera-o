<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Agrinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <div id="fase1" class="fase ativa">
            <h2>Fase 1</h2>
            <p>Qual é o principal objetivo do Projeto Agrinho?</p>
            <div class="options-grid">
                <button onclick="respostaErrada(this)">Estimular o comércio</button>
                <button onclick="proximaFase(1, 2)">Educação e Cidadania</button>
                <button onclick="respostaErrada(this)">Plantar apenas árvores</button>
            </div>
        </div>

        <div id="fase2" class="fase">
            <h2>Fase 2</h2>
            <p>Qual tema é essencial nas ações do Agrinho?</p>
            <div class="options-grid">
                <button onclick="proximaFase(2, 3)">Sustentabilidade</button>
                <button onclick="respostaErrada(this)">Exploração Espacial</button>
                <button onclick="respostaErrada(this)">Culinária de Outros Países</button>
            </div>
        </div>

        <div id="fase3" class="fase">
            <h2>Parabéns!</h2>
            <p>Você concluiu o quiz do Agrinho com sucesso!</p>
            <div class="options-grid">
                <button onclick="reiniciarJogo()">Jogar Novamente</button>
            </div>
        </div>

        <p id="feedback-erro" class="feedback-erro"></p>

    </div>

    <script src="script.js"></script>
</body>
</html>
